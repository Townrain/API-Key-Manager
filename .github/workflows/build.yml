name: Build KeyHub Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Bundle single exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --onefile --noconsole --name KeyHub `
            --add-data "key_manager;key_manager" `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "config.yaml.example;." `
            --hidden-import key_manager.web `
            --hidden-import key_manager.web._app `
            --hidden-import key_manager.web.routes.keys `
            --hidden-import key_manager.web.routes.check `
            --hidden-import key_manager.web.routes.test `
            --hidden-import key_manager.web.routes.balance `
            --hidden-import key_manager.web.routes.models `
            --hidden-import key_manager.web.routes.providers `
            --hidden-import key_manager.web.routes.stats `
            --hidden-import key_manager.web.routes.misc `
            --hidden-import key_manager.web.middleware `
            --hidden-import key_manager.web.progress `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import clr `
            --hidden-import webview.platforms.winforms `
            --hidden-import pythonnet `
            web.py

      - name: Build Installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.8
        with:
          path: installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KeyHub-Windows
          path: dist/KeyHub-Setup.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/KeyHub-Setup.exe
