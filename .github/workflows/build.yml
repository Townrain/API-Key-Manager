name: Build KeyHub Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        shell: pwsh
        run: |
          $ver = if ('${{ github.ref_type }}' -eq 'tag') { '${{ github.ref_name }}' -replace '^v', '' } else { '0.0.0' }
          $parts = $ver -split '\.'
          $tuple = "($($parts[0]),$($parts[1] -as [int] -replace '^$','0'),$($parts[2] -as [int] -replace '^$','0'),0)"
          (Get-Content version_info.template) `
            -replace '{{VERSION_TUPLE}}', $tuple `
            -replace '{{VERSION}}', $ver `
          | Set-Content version_info.txt
          Write-Host "Version: $ver  Tuple: $tuple"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Bundle single exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --onefile --noconsole --name KeyHub --version-file version_info.txt --icon keyhub.ico `
            --add-data "key_manager;key_manager" `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "static_tauri;static_tauri" `
            --add-data "config.yaml.example;." `
            --hidden-import key_manager.web `
            --hidden-import key_manager.web._app `
            --hidden-import key_manager.web.routes.keys `
            --hidden-import key_manager.web.routes.check `
            --hidden-import key_manager.web.routes.test `
            --hidden-import key_manager.web.routes.balance `
            --hidden-import key_manager.web.routes.models `
            --hidden-import key_manager.web.routes.providers `
            --hidden-import key_manager.web.routes.stats `
            --hidden-import key_manager.web.routes.misc `
            --hidden-import key_manager.web.middleware `
            --hidden-import key_manager.web.progress `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import clr `
            --hidden-import webview.platforms.winforms `
            --hidden-import pythonnet `
            --hidden-import pythonnet.runtime `
            --hidden-import cryptography.hazmat.backends.openssl.backend `
            web.py

      - name: Verify icon embedded in EXE
        shell: pwsh
        run: |
          python -c "
import struct;
with open('dist/KeyHub.exe', 'rb') as f:
    exe = f.read()
# Find RT_GROUP_ICON (type 14) or RT_ICON (type 3) in PE resources
# Simplest check: look for PNG signatures (our icon uses all-PNG frames)
png_count = 0
pos = 0
while True:
    pos = exe.find(b'\\x89PNG\\r\\n\\x1a\\n', pos)
    if pos == -1: break
    png_count += 1
    pos += 1
print(f'PNG signatures in EXE: {png_count}')
if png_count >= 6:
    print('Icon VERIFIED: all 6 PNG frames found')
else:
    print(f'WARNING: only {png_count} PNG frames (expected 6+)')
    exit(1)
"

      - name: Build Installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.8
        with:
          path: installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KeyHub-Windows
          path: dist/KeyHub-Setup.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/KeyHub-Setup.exe
