name: Build KeyHub Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # --- Python backend ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Bundle Python backend with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --onefile --name keyhub-backend `
            --add-data "key_manager;key_manager" `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "config.yaml.example;." `
            --hidden-import key_manager.web `
            --hidden-import key_manager.web._app `
            --hidden-import key_manager.web.routes.keys `
            --hidden-import key_manager.web.routes.check `
            --hidden-import key_manager.web.routes.test `
            --hidden-import key_manager.web.routes.balance `
            --hidden-import key_manager.web.routes.models `
            --hidden-import key_manager.web.routes.providers `
            --hidden-import key_manager.web.routes.stats `
            --hidden-import key_manager.web.routes.misc `
            --hidden-import key_manager.web.middleware `
            --hidden-import key_manager.web.progress `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            web.py

      # --- Node.js frontend ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tauri-compare/package-lock.json

      - name: Install frontend dependencies
        working-directory: tauri-compare
        run: npm ci

      # --- Rust / Tauri ---
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri-compare/src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('tauri-compare/src-tauri/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      # --- Build Tauri app ---
      - name: Build Tauri app
        working-directory: tauri-compare
        run: cargo tauri build --no-bundle

      # --- Copy backend exe next to app exe ---
      - name: Bundle backend with app
        shell: bash
        run: |
          cp dist/keyhub-backend.exe tauri-compare/src-tauri/target/release/
          ls -la tauri-compare/src-tauri/target/release/*.exe

      # --- Upload artifacts ---
      - name: Upload desktop exe
        uses: actions/upload-artifact@v4
        with:
          name: keyhub-desktop-windows
          path: tauri-compare/src-tauri/target/release/keyhub-desktop.exe

      - name: Upload backend exe
        uses: actions/upload-artifact@v4
        with:
          name: keyhub-backend-windows
          path: tauri-compare/src-tauri/target/release/keyhub-backend.exe

      # --- Create GitHub Release on tag push ---
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tauri-compare/src-tauri/target/release/keyhub-desktop.exe
            tauri-compare/src-tauri/target/release/keyhub-backend.exe
