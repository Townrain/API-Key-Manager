name: Tests

on:
  push:
    branches: [master]
    paths:
      - 'key_manager/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [master]
    paths:
      - 'key_manager/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check key_manager/ --select=E,W,F,I,B,C4,UP --ignore=E501

      - name: Run tests
        env:
          KEY_MANAGER_SECRET: "test-secret-for-ci"
          KEY_MANAGER_API_KEY: "test-api-key-for-ci"
        run: python -m pytest tests/ -v --tb=short
