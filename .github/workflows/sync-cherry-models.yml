name: Sync Cherry Studio Data

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00 (北京时间 10:00)
  workflow_dispatch:  # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout our repo
        uses: actions/checkout@v4

      - name: Checkout Cherry Studio (shallow)
        uses: actions/checkout@v4
        with:
          repository: CherryHQ/cherry-studio
          path: cherry-studio
          sparse-checkout: |
            src/renderer/src/config/models
            packages
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Find model definitions
        id: find
        run: |
          # 尝试多个可能的路径
          if [ -d "cherry-studio/src/renderer/src/config/models" ]; then
            echo "path=cherry-studio/src/renderer/src/config/models" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          elif [ -d "cherry-studio/packages" ]; then
            # 在 packages 目录中搜索
            MODEL_FILE=$(find cherry-studio/packages -name "default.ts" -path "*/models/*" 2>/dev/null | head -1)
            if [ -n "$MODEL_FILE" ]; then
              echo "path=$(dirname $MODEL_FILE)" >> $GITHUB_OUTPUT
              echo "found=true" >> $GITHUB_OUTPUT
            else
              echo "found=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract model capabilities
        if: steps.find.outputs.found == 'true'
        run: |
          # 设置模型目录路径
          export CHERRY_MODELS_DIR="${{ steps.find.outputs.path }}"
          python scripts/extract_model_caps.py

      - name: Extract model lists
        if: steps.find.outputs.found == 'true'
        run: |
          export CHERRY_MODELS_DIR="${{ steps.find.outputs.path }}"
          python scripts/extract_models.py

      - name: Run validation tests
        if: steps.find.outputs.found == 'true'
        run: python scripts/validate_caps.py

      - name: Check for changes
        id: diff
        if: steps.find.outputs.found == 'true'
        run: |
          git diff --quiet data/model_capabilities.json src/providers/models_registry.py || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.find.outputs.found == 'true' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/model_capabilities.json src/providers/models_registry.py
          git commit -m "chore: sync from cherry-studio $(date +%Y-%m-%d)"
          git push
